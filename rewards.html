<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Rewards - ศูนย์รวมภารกิจขั้นเทพ</title>
    <!-- ใช้ Tailwind CSS สำหรับดีไซน์สุดล้ำ -->
    <script src="https://jsdelivr.net"></script>
    <!-- ดึงเอฟเฟกต์พลุกระดาษมาใช้ตอนเช็คอินสำเร็จ -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gradient-to-b from-gray-950 to-gray-900 text-white font-sans min-h-screen p-4 flex flex-col items-center">

    <!-- 🌟 ส่วนหัวดีไซน์พรีเมียม -->
    <div class="w-full max-w-md text-center my-6">
        <span class="bg-yellow-500/10 text-yellow-400 text-xs font-bold px-3 py-1 rounded-full border border-yellow-500/20 shadow-sm animate-pulse">
            🚀 WEB3 REWARDS PLATFORM
        </span>
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500 mt-2">
            ศูนย์ล่ารางวัลขั้นเทพ
        </h1>
        <p class="text-xs text-gray-400 mt-1">สะสมแต้มคอมโบเพื่อแลกเหรียญ BEP-20 จริงบน BNB Chain</p>
    </div>

    <!-- 📱 การ์ดเมนูกิจกรรมหลัก -->
    <div class="w-full max-w-md space-y-4">
        
        <!-- ส่วนที่ 1: แผงควบคุมกระเป๋าและแต้มสะสม -->
        <div class="bg-gray-800/80 backdrop-blur-md rounded-3xl p-5 border border-gray-700 shadow-xl space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">กระเป๋าเงิน BNB (กรอกเพื่อเริ่ม)</label>
                <input type="text" id="walletInput" placeholder="0x..." 
                       class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-yellow-400 font-mono transition-all">
            </div>

            <!-- หลอดเปอร์เซ็นต์สะสมแต้ม (Progress Bar) -->
            <div class="space-y-1">
                <div class="flex justify-between text-xs font-medium">
                    <span class="text-gray-400">เป้าหมายแลกเหรียญจริง</span>
                    <span class="text-yellow-400 font-bold" id="progressText">10 / 100 แต้ม</span>
                </div>
                <div class="w-full bg-gray-950 rounded-full h-2.5 overflow-hidden border border-gray-800">
                    <div id="progressBar" class="bg-gradient-to-r from-yellow-500 to-amber-500 h-full w-[10%] transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <!-- ส่วนที่ 2: การ์ดภารกิจเช็คอินแบบมีระบบคูณคอมโบ -->
        <div class="bg-gray-800/80 backdrop-blur-md border border-gray-700 rounded-3xl p-5 flex flex-col space-y-4 shadow-lg">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-3xl bg-gray-900 p-2.5 rounded-2xl border border-gray-700 shadow-inner">📅</span>
                    <div>
                        <h3 class="font-bold text-base text-gray-100">เช็คอินคอมโบต่อเนื่อง</h3>
                        <p class="text-xs text-gray-400">เช็คอินติดต่อกันเพื่ออัปเกรดตัวคูณแต้ม</p>
                    </div>
                </div>
                <!-- ป้ายแสดงสถานะคอมโบปัจจุบัน -->
                <div class="bg-amber-500/10 border border-amber-500/30 text-amber-400 text-xs font-bold px-2.5 py-1 rounded-xl">
                    🔥 <span id="streakCount">1</span> วันติด
                </div>
            </div>

            <!-- แผนผังแสดงรางวัลจำลอง 5 วัน เพื่อให้คนอยากกดทุกวัน -->
            <div class="grid grid-cols-5 gap-1.5 py-1 text-center">
                <div class="bg-yellow-500 text-gray-950 p-2 rounded-xl text-xs font-bold">ว.1<br>+10</div>
                <div class="bg-gray-900 border border-gray-700 text-gray-400 p-2 rounded-xl text-xs">ว.2<br>+15</div>
                <div class="bg-gray-900 border border-gray-700 text-gray-400 p-2 rounded-xl text-xs">ว.3<br>+20</div>
                <div class="bg-gray-900 border border-gray-700 text-gray-400 p-2 rounded-xl text-xs">ว.4<br>+25</div>
                <div class="bg-gray-900 border border-gray-700 text-gray-400 p-2 rounded-xl text-xs">👑<br>+50</div>
            </div>

            <!-- กล่องแจ้งเตือนผลลัพธ์ -->
            <div id="resultMessage" class="hidden p-3 rounded-xl text-center text-xs font-medium transition-all"></div>

            <!-- ปุ่มกดเช็คอิน -->
            <button onclick="triggerCheckIn()" id="btnCheckIn"
                    class="w-full bg-gradient-to-r from-yellow-500 via-amber-500 to-amber-600 text-gray-950 font-extrabold py-3.5 rounded-xl active:scale-98 transition-all shadow-md shadow-yellow-500/5 cursor-pointer text-sm">
                ⚡ กดรับแต้มคอมโบวันนี้
            </button>
        </div>

    </div>

    <!-- 📜 สคริปต์ควบคุมระบบลูกเล่นหลังบ้าน -->
    <script>
        let currentPoints = 10;
        let streak = 1;

        async function triggerCheckIn() {
            const walletAddress = document.getElementById('walletInput').value.trim();
            const messageBox = document.getElementById('resultMessage');
            const btn = document.getElementById('btnCheckIn');

            if (!walletAddress) {
                messageBox.className = "p-3 rounded-xl text-center text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/30";
                messageBox.innerText = "❌ กรุณากรอกหมายเลขกระเป๋า BNB ก่อนครับคุณพี่";
                messageBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = "กำลังเชื่อมต่อบล็อกเชนจำลอง...";

            try {
                // ยิงไปเรียกไฟล์ api/checkin.js ตัวหลังบ้านที่เราสร้างไว้รอบที่แล้ว
                const response = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: walletAddress })
                });
                const data = await response.json();

                if (data.success) {
                    // 🎉 1. จุดประกายพลุดอกไม้ไฟกระจายเต็มหน้าจอเมื่อสำเร็จ!
                    confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });

                    // 2. จำลองการอัปเดตแต้มและหลอดพลังให้เห็นการเติบโต
                    streak = streak < 5 ? streak + 1 : 1;
                    currentPoints = Math.min(currentPoints + 15, 100);
                    
                    document.getElementById('streakCount').innerText = streak;
                    document.getElementById('progressText').innerText = `${currentPoints} / 100 แต้ม`;
                    document.getElementById('progressBar').style.width = `${currentPoints}%`;

                    messageBox.className = "p-3 rounded-xl text-center text-xs font-medium bg-green-500/20 text-green-400 border border-green-500/30";
                    messageBox.innerText = "🎉 เช็คอินสำเร็จ! ระบบคำนวณโบนัสคอมโบให้กระเป๋าคุณพี่เรียบร้อยแล้ว";
                } else {
                    messageBox.className = "p-3 rounded-xl text-center text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/30";
                    messageBox.innerText = "❌ " + data.message;
                }
            } catch (error) {
                messageBox.className = "p-3 rounded-xl text-center text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/30";
                messageBox.innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์";
            } finally {
                messageBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "⚡ กดรับแต้มคอมโบวันนี้";
            }
        }
    </script>
</body>
</html>
